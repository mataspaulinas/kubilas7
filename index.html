<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Hot Tub Hero — Loading</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/hot-tub-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/hot-tub-icon.svg">
  <meta name="theme-color" content="#0b1020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Hot Tub Hero">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="Hot Tub Hero">
  <style>
    html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 10%,#1d2446 0,#0b1020 40%,#05070d 100%);color:#ffe3a6;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;overflow:hidden;}
    body{display:grid;place-items:center;padding:24px;text-align:center;touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none;}
    .card{width:min(520px,92vw);border:3px solid #cc8f2e;border-radius:18px;padding:22px 18px;background:rgba(10,8,12,.78);box-shadow:0 18px 60px rgba(0,0,0,.45)}
    h1{font-size:26px;margin:0 0 10px;color:#fff0bd}p{font-size:14px;line-height:1.5;margin:8px 0}.small{font-size:12px;color:#d4c29d}.error{color:#ffb7b7;white-space:pre-wrap;text-align:left}
  </style>
</head>
<body>
  <main class="card" id="status">
    <h1>Hot Tub Hero</h1>
    <p>Loading the forest trip…</p>
    <p class="small">On iPhone: open from the GitHub Pages URL in Safari, rotate sideways, tap START, then use Share → Add to Home Screen.</p>
  </main>
  <script src="roster-patch.js?v=2026-05-22-roster-1"></script>
  <script src="crew-motion.js?v=2026-05-22-crew-motion-1"></script>
  <script src="tub-ending.js?v=2026-05-22-tub-ending-1"></script>
  <script>
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
    (async function loadGame(){
      const status = document.getElementById('status');
      const parts = Array.from({length:9},(_,i)=>`game/part-${String(i).padStart(2,'0')}.html`);
      const touchLandscapeControlFix = `<style id="touch-landscape-control-fix">
        @media (hover:none) and (pointer:coarse){
          body{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;padding:0;}
          .wrap{width:100vw;height:100svh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:6px;gap:0;place-items:center;}
          .frame{width:min(calc(100vw - 12px),calc((100svh - 12px) * 16 / 9));width:min(calc(100vw - 12px),calc((100dvh - 12px) * 16 / 9));max-height:calc(100svh - 12px);max-height:calc(100dvh - 12px);border:3px solid #09070d;outline:2px solid var(--gold);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.50);}
          .hint{display:none;}
          .controls{position:fixed !important;z-index:90;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:max(8px,env(safe-area-inset-bottom));width:auto !important;display:grid !important;grid-template-columns:72px 72px 1fr 102px;gap:10px;align-items:end;pointer-events:none;user-select:none;}
          .controls button{pointer-events:auto;min-height:66px;border-radius:999px;font-size:14px;line-height:1.05;background:linear-gradient(rgba(42,34,54,.82),rgba(17,13,22,.86));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:inset 0 2px 0 rgba(255,255,255,.12),0 10px 24px rgba(0,0,0,.38);}
          #leftBtn{grid-column:1;grid-row:1;}
          #rightBtn{grid-column:2;grid-row:1;}
          #jumpBtn{grid-column:4;grid-row:1;min-height:76px;font-size:15px;}
        }
        @media (hover:none) and (pointer:coarse) and (orientation:landscape){
          .wrap{padding:4px 6px;}
          .frame{max-height:calc(100svh - 8px);max-height:calc(100dvh - 8px);}
          .controls{grid-template-columns:64px 64px 1fr 92px;gap:8px;bottom:max(4px,env(safe-area-inset-bottom));}
          .controls button{min-height:54px;font-size:12px;}
          #jumpBtn{min-height:62px;font-size:13px;}
          .install-hint.show{display:none;}
        }
        @media (hover:none) and (pointer:coarse) and (orientation:portrait){
          .wrap{align-items:flex-start;padding-top:calc(18px + env(safe-area-inset-top));}
          .frame{width:calc(100vw - 12px);max-height:58svh;max-height:58dvh;}
          .controls{grid-template-columns:64px 64px 1fr 88px;gap:8px;}
          .controls button{min-height:60px;font-size:12px;}
          #jumpBtn{min-height:68px;font-size:13px;}
        }
      </style>`;
      try{
        const html = (await Promise.all(parts.map(async path=>{
          const response = await fetch(path + '?v=2026-05-22-tub-ending-1', {cache:'no-store'});
          if(!response.ok) throw new Error(`${path}: ${response.status} ${response.statusText}`);
          return response.text();
        }))).join('');
        let patchedHtml = window.patchHotTubHeroHtml
          ? window.patchHotTubHeroHtml(html, touchLandscapeControlFix)
          : (html.includes('touch-landscape-control-fix') ? html : html.replace('</head>', `${touchLandscapeControlFix}</head>`));
        if(window.enhanceCrewMotionHtml){
          patchedHtml = window.enhanceCrewMotionHtml(patchedHtml);
        }
        if(window.enhanceTubEndingHtml){
          patchedHtml = window.enhanceTubEndingHtml(patchedHtml);
        }
        document.open();
        document.write(patchedHtml);
        document.close();
      }catch(error){
        status.innerHTML = `<h1>Could not load game</h1><p class="error">${String(error && error.message || error)}</p><p>Make sure GitHub Pages is enabled for this repository: Settings → Pages → Deploy from branch → main → /root.</p>`;
      }
    })();
  </script>
</body>
</html>
